services:
  doctor-web:
    build:
      context: .
      dockerfile: apps/doctor-web/Dockerfile
    restart: unless-stopped
    init: true
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      DATABASE_PATH: /app/data/identity.db
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET to at least 32 random characters}
      BETTER_AUTH_URL: https://jules.agenticsonar.com
      HEYJULE_API_URL: https://api.jules.agenticsonar.com
      HEYJULE_INTERNAL_API_URL: http://api:8787
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.6}
      OPENAI_PHI_ENABLED: ${OPENAI_PHI_ENABLED:-false}
      HEYJULE_ENABLE_LEGACY_REPORTS: "false"
    expose:
      - "3000"
    volumes:
      - doctor-web-identity:/app/data
      - doctor-web-cache:/app/apps/doctor-web/.next/cache
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    stop_grace_period: 20s

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    restart: unless-stopped
    init: true
    environment:
      NODE_ENV: production
      PORT: "8787"
      HEYJULE_API_URL: https://api.jules.agenticsonar.com
      HEYJULE_DATABASE_PATH: /app/data/heyjule-api.db
      HEYJULE_DATA_KEY: ${HEYJULE_DATA_KEY:?Set HEYJULE_DATA_KEY to a 32-byte base64url key}
      HEYJULE_OAUTH_ISSUER: ${HEYJULE_OAUTH_ISSUER:?Set HEYJULE_OAUTH_ISSUER to the patient OAuth issuer}
      HEYJULE_OAUTH_AUDIENCE: https://api.jules.agenticsonar.com
      HEYJULE_OAUTH_JWKS_URL: ${HEYJULE_OAUTH_JWKS_URL:-}
      HEYJULE_DOCTOR_OAUTH_ISSUER: https://jules.agenticsonar.com
      HEYJULE_DOCTOR_OAUTH_AUDIENCE: https://api.jules.agenticsonar.com
      HEYJULE_DOCTOR_OAUTH_JWKS_URL: http://doctor-web:3000/api/auth/jwks
      HEYJULE_ALLOWED_ORIGINS: https://jules.agenticsonar.com
      HEYJULE_TRUST_PROXY: "true"
      XAI_API_KEY: ${XAI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.6}
      OPENAI_PHI_ENABLED: ${OPENAI_PHI_ENABLED:-false}
      HEYJULE_ALLOW_MOCK_LLM: ${HEYJULE_ALLOW_MOCK_LLM:-true}
      REDIS_URL: redis://chat-state:6379
    expose:
      - "8787"
    volumes:
      - heyjule-api-data:/app/data
    depends_on:
      chat-state:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:8787/healthz',{headers:{'x-forwarded-proto':'https'}}).then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    stop_grace_period: 20s

  chat-state:
    image: redis:7.4-alpine
    restart: unless-stopped
    init: true
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --save
      - "60"
      - "1000"
    expose:
      - "6379"
    volumes:
      - heyjule-chat-state:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    # The official Redis entrypoint starts as root and uses setpriv to become
    # the unprivileged redis user. Dropping SETUID/SETGID here causes an
    # immediate restart loop before Redis starts.
    stop_grace_period: 20s

volumes:
  heyjule-api-data:
  heyjule-chat-state:
  doctor-web-identity:
  doctor-web-cache:
